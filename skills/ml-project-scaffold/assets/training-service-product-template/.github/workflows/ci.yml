name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uvx pre-commit run --all-files
      - run: cd training && uv sync
      - run: cd training && uv run pytest -m "not expensive"
